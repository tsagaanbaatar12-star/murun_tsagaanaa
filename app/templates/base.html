<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Мэдээний сайт{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f5f5; }
        .navbar { background: #2c3e50 !important; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card img { height: 200px; object-fit: cover; }
        .badge-cat { background: #2c3e50; color: white; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; }
        footer { background: #2c3e50; color: white; padding: 20px 0; margin-top: 40px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('user.index') }}">📰 Мэдээний сайт</a>
    <div class="ms-auto">
      <a class="nav-link d-inline" href="{{ url_for('user.index') }}">Нүүр</a>
      <a class="nav-link d-inline" href="{{ url_for('admin.login') }}">Админ</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<footer class="text-center">
  <p class="mb-0">Lab07 | Flask MVC | <a href="/api/articles" class="text-warning">API</a></p>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
