<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Админ панел</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar { background: #2c3e50; min-height: 100vh; padding: 20px 0; }
    .sidebar a { color: #ccc; display: block; padding: 10px 20px; text-decoration: none; }
    .sidebar a:hover { background: #34495e; color: white; }
    .sidebar .brand { color: white; font-weight: bold; padding: 10px 20px 20px; font-size: 1.1rem; }
  </style>
</head>
<body>
<div class="d-flex">
  <div class="sidebar" style="width:220px; min-width:220px;">
    <div class="brand">📰 Админ панел</div>
    <a href="{{ url_for('admin.dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin.articles') }}">Мэдээнүүд</a>
    <a href="{{ url_for('user.index') }}" target="_blank">Сайт харах</a>
    <a href="/api/articles" target="_blank">API</a>
    <a href="{{ url_for('admin.logout') }}" style="color:#e74c3c; margin-top:20px;">Гарах</a>
  </div>
  <div class="flex-grow-1 p-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</div>
</body>
</html>
